<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Room Monitor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 1rem; font-size: 0.875rem; font-weight: 500; }
    .status-operational { background: #10b98120; color: #10b981; border: 1px solid #10b98140; }
    .status-occupied { background: #f59e0b20; color: #f59e0b; border: 1px solid #f59e0b40; }
    .status-maintenance { background: #ef444420; color: #ef4444; border: 1px solid #ef444440; }
    .room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
    .room-card { padding: 1.25rem; border: 1px solid var(--pico-muted-border-color); border-radius: var(--pico-border-radius); }
    .room-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .room-number { font-size: 1.5rem; font-weight: 700; }
    .room-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; font-size: 0.875rem; }
    .auth-container { max-width: 400px; margin: 2rem auto; padding: 2rem; border: 1px solid var(--pico-muted-border-color); border-radius: var(--pico-border-radius); }
    .auth-toggle { text-align: center; margin-top: 1.5rem; }
    .auth-toggle a { cursor: pointer; }
    .text-error { color: #ef4444; }
  </style>
</head>
<body>
  <header class="container">
    <nav>
      <ul><li><strong>📚 Study Room Monitor</strong></li></ul>
      <ul id="nav-menu"></ul>
    </nav>
  </header>
  <main class="container" id="app">
    <div id="view-container"></div>
  </main>
  <footer class="container"><small>Built with vanilla JS + Supabase</small></footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ========== CONFIGURATION - REPLACE THESE! ==========
    const SUPABASE_URL = 'https://irkgmqaavgkelahmxhfl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlya2dtcWFhdmdrZWxhaG14aGZsIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NjczMTg0MSwiZXhwIjoyMDkyMzA3ODQxfQ.8NuyuY9swQ0KYq4XOfIdnYT1X9Lo16qNpbSGhG-PdKE';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;

    // ========== AUTH ==========
    async function checkAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      currentUser = session?.user || null;
      return currentUser;
    }
    async function signUp(email, password) {
      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) throw error;
      return data;
    }
    async function signIn(email, password) {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      currentUser = data.user;
      return data;
    }
    async function signOut() {
      await supabase.auth.signOut();
      currentUser = null;
    }
    supabase.auth.onAuthStateChange((event, session) => {
      currentUser = session?.user || null;
      updateNavigation();
      handleRoute(window.location.hash.slice(1) || '/');
    });
    function renderLoginForm() {
      return `<div class="auth-container"><h2>Sign In</h2><form id="login-form"><label>Email <input type="email" id="login-email" required></label><label>Password <input type="password" id="login-password" required></label><div id="login-error" class="text-error"></div><button type="submit">Sign In</button></form><div class="auth-toggle">No account? <a id="show-signup">Sign Up</a></div></div>`;
    }
    function renderSignupForm() {
      return `<div class="auth-container"><h2>Sign Up</h2><form id="signup-form"><label>Email <input type="email" id="signup-email" required></label><label>Password <input type="password" id="signup-password" required minlength="6"></label><div id="signup-error" class="text-error"></div><button type="submit">Sign Up</button></form><div class="auth-toggle">Have account? <a id="show-login">Sign In</a></div></div>`;
    }
    function updateNavigation() {
      const nav = document.getElementById('nav-menu');
      if (currentUser) {
        nav.innerHTML = `<li><a href="#/">🏠 Dashboard</a></li><li><a href="#/report">📝 Report</a></li><li><span>👤 ${currentUser.email}</span></li><li><a id="logout-btn" style="cursor:pointer;">🚪 Logout</a></li>`;
        document.getElementById('logout-btn')?.addEventListener('click', async (e) => { e.preventDefault(); await signOut(); window.location.hash = '/'; });
      } else {
        nav.innerHTML = `<li><a href="#/">Home</a></li><li><a href="#/login">Login</a></li><li><a href="#/signup">Sign Up</a></li>`;
      }
    }

    // ========== ROOMS ==========
    async function fetchRooms() {
      const { data, error } = await supabase.from('rooms').select('*').order('building').order('room_number');
      if (error) throw error;
      return data;
    }
    async function updateRoomStatus(roomId, status, notes = null) {
      const updateData = { status, reported_by: currentUser?.id, reported_at: new Date().toISOString() };
      if (notes) updateData.notes = notes;
      const { error } = await supabase.from('rooms').update(updateData).eq('id', roomId);
      if (error) throw error;
    }
    function getStatusBadge(status) {
      const classes = { 'Operational': 'status-operational', 'Occupied': 'status-occupied', 'Maintenance': 'status-maintenance' };
      return `<span class="status-badge ${classes[status] || ''}">${status}</span>`;
    }
    async function renderDashboard() {
      const container = document.getElementById('view-container');
      container.innerHTML = `<h2>Study Rooms</h2><div id="rooms-loading">Loading rooms...</div><div id="rooms-container"></div>`;
      try {
        const rooms = await fetchRooms();
        document.getElementById('rooms-loading').style.display = 'none';
        const byBuilding = rooms.reduce((acc, r) => { if (!acc[r.building]) acc[r.building] = []; acc[r.building].push(r); return acc; }, {});
        let html = '';
        for (const [b, bRooms] of Object.entries(byBuilding)) {
          html += `<h3>${b}</h3><div class="room-grid">`;
          bRooms.forEach(r => {
            html += `<div class="room-card"><div class="room-header"><span class="room-number">Room ${r.room_number}</span>${getStatusBadge(r.status)}</div><div>Capacity: ${r.capacity || 'N/A'}</div>${r.notes ? `<p><small>📝 ${r.notes}</small></p>` : ''}<div class="room-footer"><small>${r.reported_at ? new Date(r.reported_at).toLocaleString() : 'No reports'}</small>${currentUser ? `<button class="secondary small update-btn" data-id="${r.id}">Update</button>` : ''}</div></div>`;
          });
          html += '</div>';
        }
        document.getElementById('rooms-container').innerHTML = html || '<p>No rooms found. Run SQL in Supabase to add rooms.</p>';
        document.querySelectorAll('.update-btn').forEach(b => b.addEventListener('click', () => showStatusModal(b.dataset.id)));
      } catch (e) {
        document.getElementById('rooms-loading').innerHTML = '<p class="text-error">Error loading rooms. Did you create the table?</p>';
      }
    }
    function showStatusModal(roomId) {
      const status = prompt('Select status:\nOperational\nOccupied\nMaintenance');
      if (!status || !['Operational','Occupied','Maintenance'].includes(status)) return;
      const notes = prompt('Notes (optional):');
      updateRoomStatus(roomId, status, notes).then(() => { alert('Updated!'); renderDashboard(); }).catch(() => alert('Error'));
    }
    function renderReportPage() {
      if (!currentUser) { window.location.hash = '/login'; return; }
      const container = document.getElementById('view-container');
      container.innerHTML = `<h2>Report Issue</h2><form id="report-form"><label>Room <select id="room-select" required><option value="">-- Select --</option></select></label><label>Status <select id="status-select" required><option value="">-- Select --</option><option value="Operational">✅ Operational</option><option value="Occupied">👥 Occupied</option><option value="Maintenance">🔧 Maintenance</option></select></label><label>Notes <textarea id="report-notes"></textarea></label><div id="report-error" class="text-error"></div><button type="submit">Submit</button></form>`;
      fetchRooms().then(rooms => { const s = document.getElementById('room-select'); rooms.forEach(r => { const o = document.createElement('option'); o.value = r.id; o.textContent = `${r.building} - ${r.room_number}`; s.appendChild(o); }); });
      document.getElementById('report-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const roomId = document.getElementById('room-select').value;
        const status = document.getElementById('status-select').value;
        const notes = document.getElementById('report-notes').value;
        if (!roomId || !status) return;
        try { await updateRoomStatus(roomId, status, notes); alert('Submitted!'); window.location.hash = '/'; }
        catch { document.getElementById('report-error').textContent = 'Error'; }
      });
    }

    // ========== ROUTER ==========
    const routes = {
      '/': { title: 'Dashboard', render: renderDashboard, auth: false },
      '/login': { title: 'Sign In', render: () => { if (currentUser) { window.location.hash = '/'; return; } document.getElementById('view-container').innerHTML = renderLoginForm(); attachAuthListeners(); }, auth: false },
      '/signup': { title: 'Sign Up', render: () => { if (currentUser) { window.location.hash = '/'; return; } document.getElementById('view-container').innerHTML = renderSignupForm(); attachAuthListeners(); }, auth: false },
      '/report': { title: 'Report', render: renderReportPage, auth: true }
    };
    async function handleRoute(path) {
      if (!path) path = '/';
      const route = routes[path];
      if (!route) { window.location.hash = '/'; return; }
      await checkAuth();
      if (route.auth && !currentUser) { window.location.hash = '/login'; return; }
      document.title = `${route.title} - Study Room Monitor`;
      route.render();
    }
    function attachAuthListeners() {
      document.getElementById('login-form')?.addEventListener('submit', async (e) => { e.preventDefault(); try { await signIn(document.getElementById('login-email').value, document.getElementById('login-password').value); window.location.hash = '/'; } catch (er) { document.getElementById('login-error').textContent = er.message; } });
      document.getElementById('signup-form')?.addEventListener('submit', async (e) => { e.preventDefault(); try { await signUp(document.getElementById('signup-email').value, document.getElementById('signup-password').value); alert('Check your email!'); window.location.hash = '/login'; } catch (er) { document.getElementById('signup-error').textContent = er.message; } });
      document.getElementById('show-signup')?.addEventListener('click', () => window.location.hash = '/signup');
      document.getElementById('show-login')?.addEventListener('click', () => window.location.hash = '/login');
    }
    window.addEventListener('hashchange', () => handleRoute(window.location.hash.slice(1) || '/'));
    handleRoute(window.location.hash.slice(1) || '/');
    updateNavigation();
  </script>
</body>
</html>
