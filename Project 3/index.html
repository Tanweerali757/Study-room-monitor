<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Study Room Monitor</title>
  
  <!-- Pico.css -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  
  <style>
    /* All CSS here */
    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 1rem;
      font-size: 0.875rem;
      font-weight: 500;
    }
    .status-operational {
      background: #10b98120;
      color: #10b981;
      border: 1px solid #10b98140;
    }
    .status-occupied {
      background: #f59e0b20;
      color: #f59e0b;
      border: 1px solid #f59e0b40;
    }
    .status-maintenance {
      background: #ef444420;
      color: #ef4444;
      border: 1px solid #ef444440;
    }
    .room-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .room-card {
      padding: 1.25rem;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
    }
    .room-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .room-number {
      font-size: 1.5rem;
      font-weight: 700;
    }
    .room-building {
      color: var(--pico-muted-color);
      margin-bottom: 0.5rem;
    }
    .room-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      font-size: 0.875rem;
    }
    .auth-container {
      max-width: 400px;
      margin: 2rem auto;
      padding: 2rem;
      border: 1px solid var(--pico-muted-border-color);
      border-radius: var(--pico-border-radius);
    }
    .auth-toggle {
      text-align: center;
      margin-top: 1.5rem;
    }
    .auth-toggle a {
      cursor: pointer;
    }
    .text-error {
      color: #ef4444;
    }
  </style>
</head>
<body>
  <header class="container">
    <nav>
      <ul>
        <li><strong>📚 Study Room Monitor</strong></li>
      </ul>
      <ul id="nav-menu"></ul>
    </nav>
  </header>

  <main class="container" id="app">
    <div id="view-container"></div>
  </main>

  <footer class="container">
    <small>Built with vanilla JS + Supabase</small>
  </footer>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    
     const SUPABASE_URL = 'https://irkgmqaavgkelahmxhfl.supabase.co';
    const SUPABASE_ANON_KEY= 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlya2dtcWFhdmdrZWxhaG14aGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MzE4NDEsImV4cCI6MjA5MjMwNzg0MX0.UjcCAIUn8g7B10l-yLGtuxoPt9noR_yrgmk2us3matA';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // ========== AUTH ==========
    let currentUser = null;

    async function checkAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      currentUser = session?.user || null;
      return currentUser;
    }

    async function signUp(email, password) {
      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) throw error;
      return data;
    }

    async function signIn(email, password) {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) throw error;
      currentUser = data.user;
      return data;
    }

    async function signOut() {
      const { error } = await supabase.auth.signOut();
      if (error) throw error;
      currentUser = null;
    }

    supabase.auth.onAuthStateChange((event, session) => {
      currentUser = session?.user || null;
      updateNavigation();
      const hash = window.location.hash.slice(1) || '/';
      handleRoute(hash);
    });

    function renderLoginForm() {
      return `
        <div class="auth-container">
          <h2>Sign In</h2>
          <form id="login-form">
            <label>Email <input type="email" id="login-email" required></label>
            <label>Password <input type="password" id="login-password" required></label>
            <div id="login-error" class="text-error" style="margin-bottom: 1rem;"></div>
            <button type="submit">Sign In</button>
          </form>
          <div class="auth-toggle">Don't have an account? <a id="show-signup">Sign Up</a></div>
        </div>
      `;
    }

    function renderSignupForm() {
      return `
        <div class="auth-container">
          <h2>Sign Up</h2>
          <form id="signup-form">
            <label>Email <input type="email" id="signup-email" required></label>
            <label>Password <input type="password" id="signup-password" required minlength="6"></label>
            <div id="signup-error" class="text-error" style="margin-bottom: 1rem;"></div>
            <button type="submit">Sign Up</button>
          </form>
          <div class="auth-toggle">Already have an account? <a id="show-login">Sign In</a></div>
        </div>
      `;
    }

    function updateNavigation() {
      const navMenu = document.getElementById('nav-menu');
      if (currentUser) {
        navMenu.innerHTML = `
          <li><a href="#/">🏠 Dashboard</a></li>
          <li><a href="#/report">📝 Report Issue</a></li>
          <li><span>👤 ${currentUser.email}</span></li>
          <li><a id="logout-btn" style="cursor: pointer;">🚪 Logout</a></li>
        `;
      } else {
        navMenu.innerHTML = `
          <li><a href="#/">Home</a></li>
          <li><a href="#/login">Login</a></li>
          <li><a href="#/signup">Sign Up</a></li>
        `;
      }
      const logoutBtn = document.getElementById('logout-btn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', async (e) => {
          e.preventDefault();
          await signOut();
          window.location.hash = '/';
        });
      }
    }

    // ========== ROOMS ==========
    async function fetchRooms() {
      const { data, error } = await supabase
        .from('rooms')
        .select('*')
        .order('building', { ascending: true })
        .order('room_number', { ascending: true });
      if (error) throw error;
      return data;
    }

    async function updateRoomStatus(roomId, status, notes = null) {
      const updateData = {
        status,
        reported_by: currentUser?.id,
        reported_at: new Date().toISOString(),
      };
      if (notes) updateData.notes = notes;
      const { data, error } = await supabase
        .from('rooms')
        .update(updateData)
        .eq('id', roomId)
        .select();
      if (error) throw error;
      return data;
    }

    function getStatusBadge(status) {
      const classes = {
        'Operational': 'status-operational',
        'Occupied': 'status-occupied',
        'Maintenance': 'status-maintenance'
      };
      return `<span class="status-badge ${classes[status] || ''}">${status}</span>`;
    }

    async function renderDashboard() {
      const container = document.getElementById('view-container');
      container.innerHTML = `
        <h2>Study Rooms</h2>
        <div id="rooms-loading">Loading rooms...</div>
        <div id="rooms-container"></div>
      `;
      try {
        const rooms = await fetchRooms();
        const roomsContainer = document.getElementById('rooms-container');
        document.getElementById('rooms-loading').style.display = 'none';
        
        const byBuilding = rooms.reduce((acc, room) => {
          if (!acc[room.building]) acc[room.building] = [];
          acc[room.building].push(room);
          return acc;
        }, {});
        
        let html = '';
        for (const [building, buildingRooms] of Object.entries(byBuilding)) {
          html += `<h3>${building}</h3><div class="room-grid">`;
          buildingRooms.forEach(room => {
            const timeAgo = room.reported_at ? new Date(room.reported_at).toLocaleString() : 'No reports';
            html += `
              <div class="room-card">
                <div class="room-header">
                  <span class="room-number">Room ${room.room_number}</span>
                  ${getStatusBadge(room.status)}
                </div>
                <div class="room-building">Capacity: ${room.capacity || 'N/A'} people</div>
                ${room.notes ? `<p><small>📝 ${room.notes}</small></p>` : ''}
                <div class="room-footer">
                  <small>Updated: ${timeAgo}</small>
                  ${currentUser ? `<button class="secondary small update-status-btn" data-room-id="${room.id}">Update</button>` : ''}
                </div>
              </div>
            `;
          });
          html += '</div>';
        }
        roomsContainer.innerHTML = html;
        
        if (currentUser) {
          document.querySelectorAll('.update-status-btn').forEach(btn => {
            btn.addEventListener('click', () => showStatusModal(btn.dataset.roomId));
          });
        }
      } catch (error) {
        document.getElementById('rooms-loading').innerHTML = '<p class="text-error">Error loading rooms.</p>';
      }
    }

    function showStatusModal(roomId) {
      const statuses = ['Operational', 'Occupied', 'Maintenance'];
      const newStatus = prompt(`Select new status:\n${statuses.join('\n')}`);
      if (!newStatus || !statuses.includes(newStatus)) return;
      const notes = prompt('Add a note (optional):');
      updateRoomStatus(roomId, newStatus, notes)
        .then(() => { alert('Room updated!'); renderDashboard(); })
        .catch(() => alert('Error updating room.'));
    }

    function renderReportPage() {
      if (!currentUser) { window.location.hash = '/login'; return; }
      const container = document.getElementById('view-container');
      container.innerHTML = `
        <h2>Report Room Issue</h2>
        <form id="report-form">
          <label>Select Room <select id="room-select" required><option value="">-- Select --</option></select></label>
          <label>Status <select id="status-select" required>
            <option value="">-- Select --</option>
            <option value="Operational">✅ Operational</option>
            <option value="Occupied">👥 Occupied</option>
            <option value="Maintenance">🔧 Maintenance</option>
          </select></label>
          <label>Notes (optional) <textarea id="report-notes"></textarea></label>
          <div id="report-error" class="text-error"></div>
          <button type="submit">Submit Report</button>
        </form>
      `;
      fetchRooms().then(rooms => {
        const select = document.getElementById('room-select');
        rooms.forEach(room => {
          const option = document.createElement('option');
          option.value = room.id;
          option.textContent = `${room.building} - Room ${room.room_number}`;
          select.appendChild(option);
        });
      });
      document.getElementById('report-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const roomId = document.getElementById('room-select').value;
        const status = document.getElementById('status-select').value;
        const notes = document.getElementById('report-notes').value;
        if (!roomId || !status) return;
        try {
          await updateRoomStatus(roomId, status, notes);
          alert('Report submitted!');
          window.location.hash = '/';
        } catch (error) {
          document.getElementById('report-error').textContent = 'Error submitting.';
        }
      });
    }

    // ========== ROUTER ==========
    const routes = {
      '/': { title: 'Dashboard', render: renderDashboard, auth: false },
      '/login': {
        title: 'Sign In',
        render: () => {
          if (currentUser) { window.location.hash = '/'; return; }
          document.getElementById('view-container').innerHTML = renderLoginForm();
          attachAuthListeners();
        },
        auth: false
      },
      '/signup': {
        title: 'Sign Up',
        render: () => {
          if (currentUser) { window.location.hash = '/'; return; }
          document.getElementById('view-container').innerHTML = renderSignupForm();
          attachAuthListeners();
        },
        auth: false
      },
      '/report': { title: 'Report Issue', render: renderReportPage, auth: true }
    };

    async function handleRoute(path) {
      if (!path || path === '') path = '/';
      const route = routes[path];
      if (!route) { window.location.hash = '/'; return; }
      await checkAuth();
      if (route.auth && !currentUser) { window.location.hash = '/login'; return; }
      document.title = `${route.title} - Study Room Monitor`;
      route.render();
    }

    function attachAuthListeners() {
      const loginForm = document.getElementById('login-form');
      if (loginForm) {
        loginForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('login-email').value;
          const password = document.getElementById('login-password').value;
          const errorDiv = document.getElementById('login-error');
          try {
            await signIn(email, password);
            window.location.hash = '/';
          } catch (error) {
            errorDiv.textContent = error.message || 'Login failed.';
          }
        });
      }
      const signupForm = document.getElementById('signup-form');
      if (signupForm) {
        signupForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const email = document.getElementById('signup-email').value;
          const password = document.getElementById('signup-password').value;
          const errorDiv = document.getElementById('signup-error');
          try {
            await signUp(email, password);
            alert('Sign up successful! Check your email.');
            window.location.hash = '/login';
          } catch (error) {
            errorDiv.textContent = error.message || 'Signup failed.';
          }
        });
      }
      document.getElementById('show-signup')?.addEventListener('click', () => window.location.hash = '/signup');
      document.getElementById('show-login')?.addEventListener('click', () => window.location.hash = '/login');
    }

    function initRouter() {
      window.addEventListener('hashchange', () => {
        handleRoute(window.location.hash.slice(1) || '/');
      });
      handleRoute(window.location.hash.slice(1) || '/');
    }

    initRouter();
    updateNavigation();
  </script>
</body>
</html>
